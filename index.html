// ─── FETCH WITH TIMEOUT ───────────────────────────────────────────────────────
function fetchT(url, ms=12000){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  return fetch(url,{signal:c.signal})
    .then(r=>r.ok?r.json():null)
    .catch(()=>null)
    .finally(()=>clearTimeout(t));
}

async function fetchPool(urls, concurrency=15){
  const out=new Array(urls.length).fill(null);
  let i=0;
  async function worker(){while(i<urls.length){const j=i++;out[j]=await fetchT(urls[j]);}}
  await Promise.all(Array.from({length:Math.min(concurrency,urls.length)},worker));
  return out;
}

// ─── SUPPORT & RESISTANCE ─────────────────────────────────────────────────────
function findSRLevels(highs, lows, closes){
  const n=highs.length;
  if(n<20) return {supports:[],resistances:[],nearest:null};

  // Pivot highs and lows with 3-bar lookback
  const pivotH=[], pivotL=[];
  for(let i=3;i<n-3;i++){
    const isH=highs[i]>highs[i-1]&&highs[i]>highs[i-2]&&highs[i]>highs[i-3]&&
              highs[i]>highs[i+1]&&highs[i]>highs[i+2]&&highs[i]>highs[i+3];
    const isL=lows[i]<lows[i-1]&&lows[i]<lows[i-2]&&lows[i]<lows[i-3]&&
              lows[i]<lows[i+1]&&lows[i]<lows[i+2]&&lows[i]<lows[i+3];
    if(isH) pivotH.push({price:highs[i],idx:i});
    if(isL) pivotL.push({price:lows[i],idx:i});
  }

  // Cluster nearby pivots (within 1.5%) into zones
  function cluster(points){
    const zones=[];
    const used=new Set();
    for(let i=0;i<points.length;i++){
      if(used.has(i)) continue;
      const group=[points[i]];
      used.add(i);
      for(let j=i+1;j<points.length;j++){
        if(used.has(j)) continue;
        if(Math.abs(points[j].price-points[i].price)/points[i].price<0.015){
          group.push(points[j]);
          used.add(j);
        }
      }
      const avg=group.reduce((a,p)=>a+p.price,0)/group.length;
      zones.push({price:avg,touches:group.length,lastIdx:Math.max(...group.map(p=>p.idx))});
    }
    return zones.sort((a,b)=>b.touches-a.touches||b.lastIdx-a.lastIdx);
  }

  const price=closes[n-1];
  const allR=cluster(pivotH).filter(z=>z.price>price*0.998).slice(0,4);
  const allS=cluster(pivotL).filter(z=>z.price<price*1.002).slice(0,4);

  // Find nearest S and R
  const nearR=allR.sort((a,b)=>a.price-b.price)[0]||null;
  const nearS=allS.sort((a,b)=>b.price-a.price)[0]||null;

  // How close is price to each zone (% distance)
  const distR=nearR?((nearR.price-price)/price)*100:null;
  const distS=nearS?((price-nearS.price)/price)*100:null;

  return{
    resistances:allR.sort((a,b)=>a.price-b.price),
    supports:allS.sort((a,b)=>b.price-a.price),
    nearR, nearS, distR, distS,
    atSupport: distS!==null&&distS<2.5,
    atResistance: distR!==null&&distR<2.5,
  };
}

// ─── REVERSAL CANDLE PATTERNS ─────────────────────────────────────────────────
function detectCandles(opens, highs, lows, closes){
  const n=closes.length;
  if(n<5) return [];
  const patterns=[];

  for(let i=n-3;i<n;i++){
    const o=opens[i], h=highs[i], l=lows[i], c=closes[i];
    const body=Math.abs(c-o);
    const range=h-l;
    const upperWick=h-Math.max(o,c);
    const lowerWick=Math.min(o,c)-l;
    const bullish=c>o;
    const prev=closes[i-1];
    const prevO=opens[i-1];
    const prevBody=Math.abs(closes[i-1]-opens[i-1]);

    if(range<0.0001) continue;

    // ── Hammer / Inverted Hammer (bullish reversal at support)
    if(lowerWick>body*2&&lowerWick>range*0.5&&body>0&&upperWick<body*0.5){
      patterns.push({name:"Hammer",bull:true,idx:i,strong:lowerWick>body*3});
    }

    // ── Shooting Star / Hanging Man (bearish reversal at resistance)
    if(upperWick>body*2&&upperWick>range*0.5&&body>0&&lowerWick<body*0.5){
      patterns.push({name:"Shooting Star",bull:false,idx:i,strong:upperWick>body*3});
    }

    // ── Doji (indecision — context matters)
    if(body<range*0.1&&range>0){
      patterns.push({name:"Doji",bull:null,idx:i,strong:false});
    }

    // ── Bullish Engulfing
    if(i>0&&bullish&&opens[i-1]>closes[i-1]&&// prev red
       c>opens[i-1]&&o<closes[i-1]&&body>prevBody*1.1){
      patterns.push({name:"Engulfing",bull:true,idx:i,strong:body>prevBody*1.5});
    }

    // ── Bearish Engulfing
    if(i>0&&!bullish&&closes[i-1]>opens[i-1]&&// prev green
       o>closes[i-1]&&c<opens[i-1]&&body>prevBody*1.1){
      patterns.push({name:"Engulfing",bull:false,idx:i,strong:body>prevBody*1.5});
    }

    // ── Bullish Pin Bar
    if(bullish&&lowerWick>range*0.6&&body<range*0.25){
      if(!patterns.find(p=>p.idx===i&&p.name==="Hammer"))
        patterns.push({name:"Pin Bar",bull:true,idx:i,strong:true});
    }

    // ── Bearish Pin Bar
    if(!bullish&&upperWick>range*0.6&&body<range*0.25){
      if(!patterns.find(p=>p.idx===i&&p.name==="Shooting Star"))
        patterns.push({name:"Pin Bar",bull:false,idx:i,strong:true});
    }
  }

  // Deduplicate by idx (keep strongest)
  const byIdx={};
  patterns.forEach(p=>{
    if(!byIdx[p.idx]||p.strong) byIdx[p.idx]=p;
  });
  return Object.values(byIdx);
}

// ─── CHART PATTERNS ──────────────────────────────────────────────────────────
function detectChartPatterns(highs, lows, closes){
  const n=closes.length;
  const patterns=[];

  // ── Double Bottom (W pattern)
  // Find two lows within 3% of each other with a higher middle
  if(n>=20){
    const recentLows=[];
    for(let i=5;i<n-5;i++){
      if(lows[i]<lows[i-1]&&lows[i]<lows[i-2]&&lows[i]<lows[i+1]&&lows[i]<lows[i+2])
        recentLows.push({price:lows[i],idx:i});
    }
    for(let a=0;a<recentLows.length-1;a++){
      for(let b=a+1;b<recentLows.length;b++){
        const l1=recentLows[a], l2=recentLows[b];
        if(l2.idx-l1.idx<5) continue; // too close
        const diff=Math.abs(l2.price-l1.price)/l1.price;
        if(diff>0.04) continue; // bottoms too far apart
        // Middle must be higher
        const mid=closes.slice(l1.idx,l2.idx);
        const midHigh=Math.max(...mid);
        if(midHigh<l1.price*1.03) continue;
        // Price should be near or above neckline
        const neckline=midHigh;
        const price=closes[n-1];
        if(price>neckline*0.97){
          patterns.push({name:"Double Bottom",bull:true,neckline,target:neckline+(neckline-Math.min(l1.price,l2.price))});
        }
      }
    }
  }

  // ── Double Top (M pattern)
  if(n>=20){
    const recentHighs=[];
    for(let i=5;i<n-5;i++){
      if(highs[i]>highs[i-1]&&highs[i]>highs[i-2]&&highs[i]>highs[i+1]&&highs[i]>highs[i+2])
        recentHighs.push({price:highs[i],idx:i});
    }
    for(let a=0;a<recentHighs.length-1;a++){
      for(let b=a+1;b<recentHighs.length;b++){
        const h1=recentHighs[a], h2=recentHighs[b];
        if(h2.idx-h1.idx<5) continue;
        const diff=Math.abs(h2.price-h1.price)/h1.price;
        if(diff>0.04) continue;
        const mid=closes.slice(h1.idx,h2.idx);
        const midLow=Math.min(...mid);
        if(midLow>h1.price*0.97) continue;
        const neckline=midLow;
        const price=closes[n-1];
        if(price<neckline*1.03){
          patterns.push({name:"Double Top",bull:false,neckline,target:neckline-(Math.max(h1.price,h2.price)-neckline)});
        }
      }
    }
  }

  // ── Higher Lows (bullish structure)
  if(n>=15){
    const l=lows.slice(-15);
    let hlCount=0;
    for(let i=1;i<l.length;i++) if(l[i]>l[i-1]) hlCount++;
    if(hlCount>=10) patterns.push({name:"Higher Lows",bull:true});
  }

  // ── Lower Highs (bearish structure)
  if(n>=15){
    const h=highs.slice(-15);
    let lhCount=0;
    for(let i=1;i<h.length;i++) if(h[i]<h[i-1]) lhCount++;
    if(lhCount>=10) patterns.push({name:"Lower Highs",bull:false});
  }

  return patterns.slice(0,3); // max 3 chart patterns
}

// ─── TREND ───────────────────────────────────────────────────────────────────
function getTrend(closes){
  const n=closes.length;
  if(n<30) return "NEUTRAL";
  // Simple EMA comparison
  function ema(arr,p){
    const k=2/(p+1);
    let e=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
    for(let i=p;i<arr.length;i++) e=arr[i]*k+e*(1-k);
    return e;
  }
  const e20=ema(closes,20);
  const e50=ema(closes,Math.min(50,n-1));
  const price=closes[n-1];
  if(price>e20&&e20>e50) return "UP";
  if(price<e20&&e20<e50) return "DOWN";
  return "NEUTRAL";
}

// ─── SCORE & SETUP ───────────────────────────────────────────────────────────
function scoreSetup(sr, candles, chartPatterns, trend, closes){
  let score=0;
  const signals=[];
  const n=closes.length;
  const price=closes[n-1];

  // S/R proximity (most important — 0-40 pts)
  if(sr.atSupport){
    const strength=sr.nearS?.touches>=3?40:sr.nearS?.touches>=2?30:20;
    score+=strength;
    signals.push({label:`S ${sr.nearS.touches}×`,type:"bull",priority:1});
  }
  if(sr.atResistance){
    const strength=sr.nearR?.touches>=3?-40:sr.nearR?.touches>=2?-30:-20;
    score+=strength; // negative = bearish
    signals.push({label:`R ${sr.nearR.touches}×`,type:"bear",priority:1});
  }

  // Recent reversal candles at S/R (0-35 pts)
  const recentCandles=candles.filter(c=>c.idx>=n-3);
  recentCandles.forEach(c=>{
    if(c.bull===true){
      const pts=c.strong?30:20;
      score+=pts;
      signals.push({label:c.name,type:"bull",priority:2});
    } else if(c.bull===false){
      const pts=c.strong?-30:-20;
      score+=pts;
      signals.push({label:c.name,type:"bear",priority:2});
    } else {
      // Doji at S/R = indecision but notable
      if(sr.atSupport||sr.atResistance)
        signals.push({label:"Doji",type:"neutral",priority:3});
    }
  });

  // Chart patterns (0-20 pts)
  chartPatterns.forEach(p=>{
    if(p.bull){score+=20;signals.push({label:p.name,type:"bull",priority:2});}
    else if(p.bull===false){score-=20;signals.push({label:p.name,type:"bear",priority:2});}
    else signals.push({label:p.name,type:"neutral",priority:3});
  });

  // Trend alignment bonus (0-10 pts)
  if(score>0&&trend==="UP"){score+=10;signals.push({label:"Uptrend",type:"bull",priority:3});}
  if(score<0&&trend==="DOWN"){score-=10;signals.push({label:"Downtrend",type:"bear",priority:3});}

  // Normalize to -100..100
  score=Math.max(-100,Math.min(100,score));

  // Rating
  let rating,color;
  const abs=Math.abs(score);
  if(abs>=60){rating=score>0?"LONG":"SHORT";color=score>0?"#00e676":"#ff4d6d";}
  else if(abs>=35){rating=score>0?"WATCH L":"WATCH S";color=score>0?"#4dff91":"#ff7a8a";}
  else{rating="NEUTRAL";color="#ffb700";}

  // Risk/Reward from S/R levels
  let rr=null, stop=null, target=null;
  if(score>0&&sr.nearS&&sr.nearR){
    stop=sr.nearS.price*0.995;
    target=sr.nearR.price;
    const risk=price-stop;
    const reward=target-price;
    if(risk>0) rr=(reward/risk).toFixed(1);
  } else if(score<0&&sr.nearR&&sr.nearS){
    stop=sr.nearR.price*1.005;
    target=sr.nearS.price;
    const risk=stop-price;
    const reward=price-target;
    if(risk>0) rr=(reward/risk).toFixed(1);
  }

  // Deduplicate signals, sort by priority
  const seen=new Set();
  const uniqueSignals=signals.filter(s=>{
    const k=s.label+s.type;
    if(seen.has(k)) return false;
    seen.add(k); return true;
  }).sort((a,b)=>a.priority-b.priority).slice(0,5);

  return{score,rating,color,signals:uniqueSignals,rr,stop,target,trend};
}

// ─── VOLUME CALC ──────────────────────────────────────────────────────────────
function calcVolume(klines){
  // k[7] = quoteAssetVolume (USDT value)
  if(!klines||klines.length<6) return 0;
  return klines.slice(-6).reduce((a,k)=>a+parseFloat(k[7]),0); // last 24h (6×4H)
}

// ─── BUILD OPPORTUNITY ───────────────────────────────────────────────────────
function buildOp(sym, klines, market="SPOT", funding=null){
  if(!klines||klines.length<30) return null;
  const opens=klines.map(k=>parseFloat(k[1]));
  const highs=klines.map(k=>parseFloat(k[2]));
  const lows=klines.map(k=>parseFloat(k[3]));
  const closes=klines.map(k=>parseFloat(k[4]));
  const n=closes.length;

  const volume=calcVolume(klines);
  if(volume<3e7) return null; // $30M min 24h volume

  const price=closes[n-1];
  const change24h=n>=7?((closes[n-1]-closes[n-7])/closes[n-7])*100:0;
  const sr=findSRLevels(highs,lows,closes);
  const candles=detectCandles(opens,highs,lows,closes);
  const chartPatterns=detectChartPatterns(highs,lows,closes);
  const trend=getTrend(closes);
  const setup=scoreSetup(sr,candles,chartPatterns,trend,closes);

  // Only return if there's actually an actionable signal
  if(setup.signals.length===0) return null;

  return{
    id:`${sym}-${market}`,
    symbol:sym,
    market,
    price,
    change24h,
    volume,
    sr,
    candles,
    chartPatterns,
    trend,
    funding,
    ...setup,
    highs,lows,closes,opens,
  };
}

// ─── SIM DATA ─────────────────────────────────────────────────────────────────
function makeSim(sym){
  const prices=[85000,2100,580,135,2.15,0.175,0.71,22,13.5,4.2,2.6,92,5.2,0.42,0.75,2.1,9.5,4.1,165,3.6,0.0000082,0.175,0.000023,0.084,2.1,4.2,0.95,1.8,0.0000145,9.8,0.52,2.8,4.2,1.8,0.85,0.62,0.082,0.95,0.22,0.28,0.15,18,0.18,0.85,1600,45];
  const i=COINS.indexOf(sym);
  const base=prices[i]||1;
  const n=100;
  const klines=[];
  let p=base*0.92;
  // Generate realistic price with a support test and reversal
  for(let j=0;j<n;j++){
    const trend=j<40?-0.001:j<55?0.0005:0.002;
    const noise=(Math.random()-0.5)*0.025;
    p=p*(1+trend+noise);
    const o=p;
    const c=p*(1+(Math.random()-0.48)*0.02);
    const h=Math.max(o,c)*(1+Math.random()*0.008);
    const ll=Math.min(o,c)*(1-Math.random()*0.008);
    const vol=base*1200*(0.8+Math.random()*0.4);
    const quoteVol=vol*p;
    klines.push([j*14400000,o.toFixed(8),h.toFixed(8),ll.toFixed(8),c.toFixed(8),
      (vol).toFixed(2),j*14400000+14399999,quoteVol.toFixed(2),Math.floor(Math.random()*500),'0','0','0']);
  }
  // Force a hammer on last candle at support
  const lastC=parseFloat(klines[n-1][4]);
  const fakeH=lastC*1.003;
  const fakeL=lastC*0.982; // big lower wick
  const fakeO=lastC*0.999;
  klines[n-1][1]=fakeO.toFixed(8);
  klines[n-1][2]=fakeH.toFixed(8);
  klines[n-1][3]=fakeL.toFixed(8);
  return buildOp(sym.replace("USDT",""),klines,"SPOT");
}

// ─── MINI CHART ──────────────────────────────────────────────────────────────
function MiniChart({closes,highs,lows,sr,width=80,height=32}){
  if(!closes||closes.length<10) return null;
  const n=Math.min(closes.length,40);
  const slice=closes.slice(-n);
  const allH=highs.slice(-n);
  const allL=lows.slice(-n);
  const mn=Math.min(...allL)*0.9995;
  const mx=Math.max(...allH)*1.0005;
  const range=mx-mn;
  const W=width, H=height;
  const px=(v,i)=>((i/(n-1))*W).toFixed(1);
  const py=(v)=>((1-(v-mn)/range)*H).toFixed(1);
  const pts=slice.map((c,i)=>`${px(c,i)},${py(c)}`).join(" ");

  // S/R lines
  const srLines=[];
  if(sr.nearS) srLines.push({y:py(sr.nearS.price),color:"#00e67650"});
  if(sr.nearR) srLines.push({y:py(sr.nearR.price),color:"#ff4d6d50"});

  const last=slice[n-1];
  const first=slice[0];
  const up=last>=first;

  return(
    <svg width={W} height={H} style={{display:"block",overflow:"visible"}}>
      {srLines.map((l,i)=>(
        <line key={i} x1="0" y1={l.y} x2={W} y2={l.y} stroke={l.color} strokeWidth="1" strokeDasharray="3,2"/>
      ))}
      <polyline
        points={pts}
        fill="none"
        stroke={up?"#00e676":"#ff4d6d"}
        strokeWidth="1.5"
        strokeLinecap="round"
        strokeLinejoin="round"
      />
      {/* Last price dot */}
      <circle cx={px(last,n-1)} cy={py(last)} r="2.5" fill={up?"#00e676":"#ff4d6d"}/>
    </svg>
  );
}

// ─── SIGNAL BADGE ─────────────────────────────────────────────────────────────
function Badge({label,type}){
  const colors={
    bull:{bg:"#00301a",border:"#00e676",text:"#00e676"},
    bear:{bg:"#2d0010",border:"#ff4d6d",text:"#ff4d6d"},
    neutral:{bg:"#1a1600",border:"#ffb700",text:"#ffb700"},
  };
  const c=colors[type]||colors.neutral;
  return(
    <span style={{
      display:"inline-flex",alignItems:"center",
      padding:"2px 7px",borderRadius:4,
      background:c.bg,border:`1px solid ${c.border}`,
      color:c.text,fontSize:10,fontWeight:700,
      fontFamily:"var(--mono)",letterSpacing:.5,
      whiteSpace:"nowrap",
    }}>{label}</span>
  );
}

// ─── TRADINGVIEW CHART ───────────────────────────────────────────────────────
function TVChart({symbol, interval}){
  const ref=useRef(null);
  const widgetRef=useRef(null);

  useEffect(()=>{
    if(!ref.current) return;

    // Remove old widget
    if(widgetRef.current){
      try{ widgetRef.current.remove(); }catch(e){}
      widgetRef.current=null;
    }
    ref.current.innerHTML="";

    // TradingView widget via their official script embed
    const container=document.createElement("div");
    container.id="tv-widget-"+Math.random().toString(36).slice(2);
    container.style.height="100%";
    ref.current.appendChild(container);

    const script=document.createElement("script");
    script.src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    script.async=true;
    script.type="text/javascript";
    script.innerHTML=JSON.stringify({
      autosize:true,
      symbol:symbol,
      interval:interval,
      timezone:"Etc/UTC",
      theme:"dark",
      style:"1",
      locale:"en",
      backgroundColor:"#0d1219",
      gridColor:"#1a2535",
      hide_top_toolbar:false,
      hide_legend:false,
      save_image:false,
      allow_symbol_change:false,
      support_host:"https://www.tradingview.com",
    });
    container.appendChild(script);
    widgetRef.current=container;

    return()=>{
      if(ref.current) ref.current.innerHTML="";
    };
  },[symbol,interval]);

  return <div ref={ref} style={{height:320,width:"100%"}}/>;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [ops,setOps]=useState([]);
  const [scanning,setScanning]=useState(false);
  const [progress,setProgress]=useState(0);
  const [selected,setSelected]=useState(null);
  const [filter,setFilter]=useState("ALL"); // ALL | LONG | SHORT | WATCH
  const [marketFilter,setMarketFilter]=useState("ALL"); // ALL | SPOT | PERP
  const [dataMode,setDataMode]=useState("sim");
  const [lastScan,setLastScan]=useState(null);
  const [errorMsg,setErrorMsg]=useState("");
  const [search,setSearch]=useState("");

  const scan=useCallback(async()=>{
    setScanning(true);setProgress(0);setErrorMsg("");
    let result=[];
    let live=false;

    try{
      // Fetch all spot klines in parallel pool
      const spotUrls=COINS.map(s=>`${BASE}/klines?symbol=${s}&interval=4h&limit=100`);
      const perpUrls=COINS.map(s=>`${FBASE}/klines?symbol=${s}&interval=4h&limit=100`);

      setProgress(10);
      const [spotK, perpK, frData] = await Promise.all([
        fetchPool(spotUrls, 15),
        fetchPool(perpUrls, 15),
        fetchT(`${FBASE}/premiumIndex`),
      ]);
      setProgress(75);

      const fundingMap={};
      if(frData&&Array.isArray(frData)) frData.forEach(x=>{fundingMap[x.symbol]=parseFloat(x.lastFundingRate);});

      const ops=[];
      COINS.forEach((sym,i)=>{
        const base=sym.replace("USDT","");
        if(spotK[i]){
          const op=buildOp(base,spotK[i],"SPOT");
          if(op) ops.push(op);
        }
        if(perpK[i]){
          const op=buildOp(base,perpK[i],"PERP",fundingMap[sym]??null);
          if(op) ops.push(op);
        }
      });

      if(ops.length>0){ result=ops; live=true; }
    }catch(e){}

    setProgress(90);

    if(!live){
      // SIM fallback
      const simOps=COINS.map(sym=>makeSim(sym)).filter(Boolean);
      result=simOps;
      setErrorMsg("Live data unavailable — showing simulated data");
    }

    // Sort by absolute score (strongest signals first)
    result.sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
    setProgress(100);
    setOps(result);
    setDataMode(live?"live":"sim");
    setLastScan(new Date());
    setScanning(false);
  },[]);

  useEffect(()=>{scan();},[]);

  const filtered=useMemo(()=>{
    return ops.filter(op=>{
      if(search&&!op.symbol.toLowerCase().includes(search.toLowerCase())) return false;
      if(marketFilter!=="ALL"&&op.market!==marketFilter) return false;
      if(filter==="LONG"&&op.score<=0) return false;
      if(filter==="SHORT"&&op.score>=0) return false;
      if(filter==="WATCH"&&!(op.rating==="WATCH L"||op.rating==="WATCH S")) return false;
      return true;
    });
  },[ops,filter,marketFilter,search]);

  const counts={
    LONG:ops.filter(o=>o.score>35).length,
    SHORT:ops.filter(o=>o.score<-35).length,
    WATCH:ops.filter(o=>Math.abs(o.score)<=35&&Math.abs(o.score)>0).length,
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",maxHeight:"100dvh"}}>

      {/* ── HEADER ── */}
      <div style={{
        padding:"12px 16px 0",
        borderBottom:"1px solid var(--border)",
        background:"var(--bg)",
        flexShrink:0,
      }}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,letterSpacing:1.5,color:"var(--text)"}}>
              SR SCANNER
            </div>
            <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--mono)",marginTop:1,display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:dataMode==="live"?"var(--green)":"var(--amber)",display:"inline-block",animation:dataMode==="live"?"pulse 2s infinite":""}}/>
              {dataMode==="live"?"LIVE":"SIM"}
              {lastScan&&<span>· {lastScan.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}</span>}
              {errorMsg&&<span style={{color:"var(--amber)"}}>· {errorMsg}</span>}
            </div>
          </div>
          <button onClick={scan} disabled={scanning} style={{
            background:scanning?"var(--surface)":"var(--green-dim)",
            border:`1px solid ${scanning?"var(--border)":"var(--green)"}`,
            color:scanning?"var(--muted)":"var(--green)",
            borderRadius:8,padding:"8px 14px",
            fontSize:12,fontWeight:700,fontFamily:"var(--mono)",letterSpacing:.5,
            display:"flex",alignItems:"center",gap:6,
          }}>
            {scanning?(
              <span style={{display:"inline-block",width:12,height:12,border:"2px solid var(--border)",borderTopColor:"var(--muted)",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
            ):"↻"}
            {scanning?`${progress}%`:"SCAN"}
          </button>
        </div>

        {/* Progress bar */}
        {scanning&&(
          <div style={{height:2,background:"var(--border)",borderRadius:1,marginBottom:10,overflow:"hidden"}}>
            <div style={{height:"100%",background:"var(--green)",borderRadius:1,width:`${progress}%`,transition:"width .3s"}}/>
          </div>
        )}

        {/* Stats row */}
        {ops.length>0&&!scanning&&(
          <div style={{display:"flex",gap:16,marginBottom:10,fontSize:11,fontFamily:"var(--mono)"}}>
            <span style={{color:"var(--green)"}}>▲ {counts.LONG} LONG</span>
            <span style={{color:"var(--red)"}}>▼ {counts.SHORT} SHORT</span>
            <span style={{color:"var(--amber)"}}>◆ {counts.WATCH} WATCH</span>
            <span style={{color:"var(--muted)",marginLeft:"auto"}}>{ops.length} coins</span>
          </div>
        )}

        {/* Filter tabs */}
        <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
          {[
            {k:"ALL",label:"All"},
            {k:"LONG",label:`Long${counts.LONG?` ${counts.LONG}`:""}`,color:"var(--green)"},
            {k:"SHORT",label:`Short${counts.SHORT?` ${counts.SHORT}`:""}`,color:"var(--red)"},
            {k:"WATCH",label:`Watch`,color:"var(--amber)"},
          ].map(({k,label,color})=>(
            <button key={k} onClick={()=>setFilter(k)} style={{
              padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:600,
              whiteSpace:"nowrap",flexShrink:0,
              background:filter===k?(k==="LONG"?"#001a0d":k==="SHORT"?"#1a000a":k==="WATCH"?"#1a1200":"var(--surface)"):"transparent",
              border:`1px solid ${filter===k?(k==="LONG"?"var(--green)":k==="SHORT"?"var(--red)":k==="WATCH"?"var(--amber)":"var(--border2)"):"var(--border)"}`,
              color:filter===k?(color||"var(--text)"):"var(--muted)",
            }}>{label}</button>
          ))}
          <div style={{width:1,background:"var(--border)",flexShrink:0}}/>
          {["ALL","SPOT","PERP"].map(m=>(
            <button key={m} onClick={()=>setMarketFilter(m)} style={{
              padding:"6px 10px",borderRadius:6,fontSize:11,fontWeight:600,
              whiteSpace:"nowrap",flexShrink:0,
              background:marketFilter===m?"var(--surface)":"transparent",
              border:`1px solid ${marketFilter===m?"var(--border2)":"var(--border)"}`,
              color:marketFilter===m?"var(--text)":"var(--muted)",
            }}>{m}</button>
          ))}
        </div>

        {/* Search */}
        <div style={{marginBottom:10,position:"relative"}}>
          <input
            value={search}
            onChange={e=>setSearch(e.target.value)}
            placeholder="Search coin..."
            style={{width:"100%",background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",borderRadius:8,padding:"8px 12px 8px 32px",fontSize:13}}
          />
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--muted)",fontSize:14}}>⌕</span>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--muted)",fontSize:14}}>✕</button>}
        </div>
      </div>

      {/* ── LIST ── */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        {scanning&&ops.length===0&&(
          <div style={{padding:"40px 20px",textAlign:"center"}}>
            <div style={{fontSize:13,color:"var(--muted)",fontFamily:"var(--mono)"}}>
              Scanning {COINS.length} pairs...
            </div>
            <div style={{marginTop:16,height:2,background:"var(--border)",borderRadius:1,overflow:"hidden",maxWidth:200,margin:"16px auto 0"}}>
              <div style={{height:"100%",background:"var(--green)",borderRadius:1,width:`${progress}%`,transition:"width .3s"}}/>
            </div>
          </div>
        )}

        {!scanning&&filtered.length===0&&(
          <div style={{padding:"60px 20px",textAlign:"center",color:"var(--muted)",fontSize:13}}>
            {ops.length===0?"No data yet — tap SCAN":"No coins match the current filter"}
          </div>
        )}

        {filtered.map((op,i)=>(
          <Row key={op.id} op={op} onClick={()=>setSelected(op)}/>
        ))}

        {filtered.length>0&&(
          <div style={{padding:"16px",textAlign:"center",fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)"}}>
            {filtered.length} results · tap any coin for details
          </div>
        )}
      </div>

      {/* ── DETAIL PANEL ── */}
      {selected&&<DetailPanel op={selected} onClose={()=>setSelected(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
