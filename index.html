// ─── TECHNICAL INDICATORS ──────────────────────────────────────────────────────
function calcEMA(prices, period) {
  if (!prices || prices.length < period) return null;
  const k = 2 / (period + 1);
  let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < prices.length; i++) ema = prices[i] * k + ema * (1 - k);
  return ema;
}

function calcEMASeries(prices, period) {
  if (!prices || prices.length < period) return [];
  const k = 2 / (period + 1);
  let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
  const series = new Array(period - 1).fill(null);
  series.push(ema);
  for (let i = period; i < prices.length; i++) { ema = prices[i] * k + ema * (1 - k); series.push(ema); }
  return series;
}

function calcRSI(prices, period = 14) {
  if (!prices || prices.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = prices.length - period; i < prices.length; i++) {
    const d = prices[i] - prices[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  let ag = gains / period, al = losses / period;
  // Smooth with remaining bars
  for (let i = prices.length - period + 1; i < prices.length; i++) {
    const d = prices[i] - prices[i - 1];
    ag = (ag * (period - 1) + Math.max(d, 0)) / period;
    al = (al * (period - 1) + Math.max(-d, 0)) / period;
  }
  return al === 0 ? 100 : 100 - 100 / (1 + ag / al);
}

function calcMACD(prices) {
  if (!prices || prices.length < 26) return { macd: 0, signal: 0, hist: 0, crossover: false };
  const ema12 = calcEMASeries(prices, 12);
  const ema26 = calcEMASeries(prices, 26);
  const macdLine = ema12.map((v, i) => (v && ema26[i]) ? v - ema26[i] : null).filter(Boolean);
  if (macdLine.length < 9) return { macd: 0, signal: 0, hist: 0, crossover: false };
  const signalLine = calcEMASeries(macdLine, 9);
  const last = macdLine.length - 1;
  const macd = macdLine[last];
  const sig = signalLine[last];
  const prevMacd = macdLine[last - 1];
  const prevSig = signalLine[last - 1];
  const hist = macd - sig;
  // Bullish crossover: MACD just crossed above signal
  const crossover = prevMacd < prevSig && macd > sig;
  // Recent bullish cross (within last 3 bars)
  const recentCross = macdLine.slice(-3).some((m, i) => {
    const s = signalLine.slice(-3)[i];
    const pm = macdLine.slice(-4)[i];
    const ps = signalLine.slice(-4)[i];
    return pm && ps && pm < ps && m > s;
  });
  return { macd, signal: sig, hist, crossover, recentCross, bullish: macd > sig };
}

function calcBollingerBands(prices, period = 20, stdDev = 2) {
  if (!prices || prices.length < period) return { upper: 0, mid: 0, lower: 0, pct: 0.5 };
  const slice = prices.slice(-period);
  const mid = slice.reduce((a, b) => a + b, 0) / period;
  const variance = slice.reduce((a, b) => a + Math.pow(b - mid, 2), 0) / period;
  const std = Math.sqrt(variance);
  const upper = mid + stdDev * std;
  const lower = mid - stdDev * std;
  const price = prices[prices.length - 1];
  const pct = std === 0 ? 0.5 : (price - lower) / (upper - lower); // 0=at lower, 1=at upper
  return { upper, mid, lower, pct };
}

function detectCandlePattern(klines) {
  // klines: array of {o, h, l, c} objects
  if (!klines || klines.length < 3) return { pattern: "None", bullish: false, strength: 0 };
  const last = klines[klines.length - 1];
  const prev = klines[klines.length - 2];
  const prev2 = klines[klines.length - 3];
  const { o, h, l, c } = last;
  const body = Math.abs(c - o);
  const totalRange = h - l || 0.0001;
  const upperWick = h - Math.max(o, c);
  const lowerWick = Math.min(o, c) - l;

  // Hammer / Bullish Pin Bar: small body, long lower wick, near bottom
  if (lowerWick > body * 2 && lowerWick > upperWick * 2 && c > o)
    return { pattern: "Hammer", bullish: true, strength: 3 };

  // Bullish Engulfing: current green candle engulfs previous red
  if (c > o && prev.c < prev.o && c > prev.o && o < prev.c)
    return { pattern: "Bullish Engulfing", bullish: true, strength: 3 };

  // Morning Star: 3-candle reversal
  if (prev2.c < prev2.o && Math.abs(prev.c - prev.o) < totalRange * 0.3 && c > o && c > (prev2.o + prev2.c) / 2)
    return { pattern: "Morning Star", bullish: true, strength: 3 };

  // Bullish Harami: small green inside previous big red
  if (c > o && prev.c < prev.o && c < prev.o && o > prev.c && body < Math.abs(prev.c - prev.o) * 0.6)
    return { pattern: "Bullish Harami", bullish: true, strength: 2 };

  // Doji near support (indecision, potential reversal)
  if (body < totalRange * 0.1 && lowerWick > totalRange * 0.3)
    return { pattern: "Doji (Reversal?)", bullish: true, strength: 1 };

  // Inverted Hammer at bottom
  if (upperWick > body * 2 && lowerWick < body * 0.5 && c > o)
    return { pattern: "Inv. Hammer", bullish: true, strength: 1 };

  // Bearish patterns
  if (upperWick > body * 2 && c < o) return { pattern: "Shooting Star", bullish: false, strength: -2 };
  if (c < o && prev.c > prev.o && c < prev.o && o > prev.c) return { pattern: "Bearish Engulfing", bullish: false, strength: -3 };

  // Plain bullish or bearish candle
  if (c > o && body > totalRange * 0.6) return { pattern: "Strong Bullish", bullish: true, strength: 2 };
  if (c < o && body > totalRange * 0.6) return { pattern: "Strong Bearish", bullish: false, strength: -1 };

  return { pattern: "Neutral", bullish: false, strength: 0 };
}

function detectRSIDivergence(closes, period = 14) {
  if (closes.length < 30) return { bullishDiv: false, bearishDiv: false };
  // Check last 15 bars for divergence
  const rsiSeries = [];
  for (let i = period + 1; i <= closes.length; i++) rsiSeries.push(calcRSI(closes.slice(0, i)));
  const priceLast = closes[closes.length - 1];
  const pricePrev = Math.min(...closes.slice(-15, -5));
  const rsiLast = rsiSeries[rsiSeries.length - 1];
  const rsiPrev = Math.min(...rsiSeries.slice(-15, -5));
  // Bullish divergence: price made lower low but RSI made higher low
  const bullishDiv = priceLast < pricePrev && rsiLast > rsiPrev + 2;
  // Bearish divergence: price higher high but RSI lower high
  const priceHigh = closes[closes.length - 1] > Math.max(...closes.slice(-15, -5));
  const rsiHigh = rsiLast < Math.max(...rsiSeries.slice(-15, -5)) - 2;
  const bearishDiv = priceHigh && rsiHigh;
  return { bullishDiv, bearishDiv };
}

// ─── SMC: PIVOT POINTS ────────────────────────────────────────────────────────
// Finds swing highs/lows (left/right neighbours lower/higher)
function findPivots(highs, lows, lookback = 3) {
  const pivotHighs = [], pivotLows = [];
  for (let i = lookback; i < highs.length - lookback; i++) {
    const isHigh = highs.slice(i - lookback, i).every(h => h <= highs[i]) &&
                   highs.slice(i + 1, i + lookback + 1).every(h => h <= highs[i]);
    if (isHigh) pivotHighs.push({ idx: i, price: highs[i] });
    const isLow = lows.slice(i - lookback, i).every(l => l >= lows[i]) &&
                  lows.slice(i + 1, i + lookback + 1).every(l => l >= lows[i]);
    if (isLow) pivotLows.push({ idx: i, price: lows[i] });
  }
  return { pivotHighs, pivotLows };
}

// ─── SMC: ORDER BLOCKS ────────────────────────────────────────────────────────
// Bullish OB = last bearish candle before a strong up-move
// Bearish OB = last bullish candle before a strong down-move
function detectOrderBlocks(opens, highs, lows, closes) {
  const n = closes.length;
  if (n < 10) return { bullishOB: null, bearishOB: null, atBullishOB: false, atBearishOB: false };
  const price = closes[n - 1];
  let bullishOB = null, bearishOB = null;

  // Look back last 40 bars for impulsive moves
  for (let i = n - 40; i < n - 3; i++) {
    if (i < 1) continue;
    const isBear = closes[i] < opens[i]; // bearish candle
    const bodySize = Math.abs(closes[i] - opens[i]);
    const range = highs[i] - lows[i] || 0.0001;

    // Bullish OB: bearish candle followed by 3+ consecutive bullish closes with strong displacement
    if (isBear) {
      const nextMove = closes[i + 3] - closes[i];
      const displacement = nextMove / closes[i];
      if (displacement > 0.02 && closes[i + 1] > closes[i] && closes[i + 2] > closes[i + 1]) {
        const obHigh = Math.max(opens[i], closes[i]);
        const obLow = Math.min(opens[i], closes[i]);
        // Price currently inside or just above OB = potential demand zone
        if (price >= obLow * 0.995 && price <= obHigh * 1.03) {
          bullishOB = { high: obHigh, low: obLow, idx: i, strength: displacement > 0.05 ? 3 : displacement > 0.03 ? 2 : 1 };
        }
      }
    }

    // Bearish OB: bullish candle followed by strong down-move
    if (!isBear) {
      const nextMove = closes[i + 3] - closes[i];
      const displacement = nextMove / closes[i];
      if (displacement < -0.02 && closes[i + 1] < closes[i] && closes[i + 2] < closes[i + 1]) {
        const obHigh = Math.max(opens[i], closes[i]);
        const obLow = Math.min(opens[i], closes[i]);
        if (price >= obLow * 0.97 && price <= obHigh * 1.005) {
          bearishOB = { high: obHigh, low: obLow, idx: i, strength: displacement < -0.05 ? 3 : 2 };
        }
      }
    }
  }

  return {
    bullishOB,
    bearishOB,
    atBullishOB: bullishOB !== null,
    atBearishOB: bearishOB !== null,
  };
}

// ─── SMC: BREAK OF STRUCTURE (BOS) ───────────────────────────────────────────
// Bullish BOS = price breaks above a prior swing high (structure break to upside)
// CHoCH = Change of Character = bearish → bullish flip
// FIX: 3-bar look-back window — no labeled breaks (iOS Safari/Babel compat)
function findBOSBreak(pivots, closes, n, direction) {
  // direction: 'up' = bullish BOS, 'down' = bearish BOS
  for (let p = 0; p < pivots.length; p++) {
    const level = pivots[p].price;
    for (let i = Math.max(1, n - 4); i < n; i++) {
      if (direction === 'up' && closes[i] > level && closes[i - 1] <= level) return level;
      if (direction === 'down' && closes[i] < level && closes[i - 1] >= level) return -level;
    }
  }
  return null;
}
function detectBOS(highs, lows, closes) {
  if (closes.length < 20) return { bullishBOS: false, bearishBOS: false, choch: false, bosLevel: null };
  const price = closes[closes.length - 1];
  const { pivotHighs, pivotLows } = findPivots(highs, lows, 3);
  const n = closes.length;

  const bullishLevel = findBOSBreak(pivotHighs.slice(-5), closes, n, 'up');
  const bullishBOS = bullishLevel !== null;
  const bosLevel = bullishLevel;

  const bearishResult = findBOSBreak(pivotLows.slice(-5), closes, n, 'down');
  const bearishBOS = bearishResult !== null;

  // CHoCH: series of lower highs then price breaks the last one
  let choch = false;
  if (!bullishBOS && pivotHighs.length >= 3) {
    const r = pivotHighs.slice(-3);
    const lowerHighSeries = r[2].price < r[1].price && r[1].price < r[0].price;
    if (lowerHighSeries && price > r[2].price * 1.001) choch = true;
  }

  return { bullishBOS, bearishBOS, choch, bosLevel };
}

// ─── SMC: DOUBLE BOTTOM ──────────────────────────────────────────────────────
// Two pivot lows within 1.5% of each other, with a recovery peak between them
function detectDoubleBottom(highs, lows, closes) {
  if (closes.length < 20) return { doubleBottom: false, neckline: null, pattern: null };
  const price = closes[closes.length - 1];
  const { pivotLows, pivotHighs } = findPivots(highs, lows, 3);

  if (pivotLows.length < 2) return { doubleBottom: false, neckline: null, pattern: null };

  const last = pivotLows[pivotLows.length - 1];
  const prev = pivotLows[pivotLows.length - 2];

  // Both lows within 2% of each other (same level)
  const diff = Math.abs(last.price - prev.price) / Math.max(last.price, prev.price);
  // 4% tolerance — real double bottoms on 4H often differ by 2-4%
  if (diff > 0.04) return { doubleBottom: false, neckline: null, pattern: null };

  // Find the peak between the two lows
  const peakBetween = pivotHighs.find(ph => ph.idx > prev.idx && ph.idx < last.idx);
  if (!peakBetween) return { doubleBottom: false, neckline: null, pattern: null };
  const neckline = peakBetween.price;

  // Double bottom confirmed: current price back near neckline or just broke above
  const nearNeckline = price >= neckline * 0.97;
  const brokePast = price > neckline;

  return {
    doubleBottom: true,
    neckline,
    bottomPrice: (last.price + prev.price) / 2,
    brokePast,
    nearNeckline,
    pattern: brokePast ? "Double Bottom (Confirmed)" : nearNeckline ? "Double Bottom (Near Breakout)" : "Double Bottom (Forming)"
  };
}

// ─── SMC: LIQUIDITY ZONES (equal highs/lows) ─────────────────────────────────
// Equal highs = sell-side liquidity above (smart money targets)
// Equal lows = buy-side liquidity below (smart money may sweep before up-move)
function detectLiquidityZones(highs, lows, closes) {
  if (closes.length < 15) return { equalLows: null, equalHighs: null, liquiditySweep: false };
  const price = closes[closes.length - 1];
  const n = closes.length;

  // Check last 30 bars for equal highs/lows (within 0.3%)
  const recentHighs = highs.slice(-30);
  const recentLows = lows.slice(-30);

  let equalHighsPrice = null, equalLowsPrice = null;
  for (let i = 0; i < recentHighs.length - 1; i++) {
    for (let j = i + 3; j < recentHighs.length; j++) {
      if (Math.abs(recentHighs[i] - recentHighs[j]) / recentHighs[i] < 0.003) {
        equalHighsPrice = (recentHighs[i] + recentHighs[j]) / 2;
        break;
      }
    }
    if (equalHighsPrice) break;
  }
  for (let i = 0; i < recentLows.length - 1; i++) {
    for (let j = i + 3; j < recentLows.length; j++) {
      if (Math.abs(recentLows[i] - recentLows[j]) / recentLows[i] < 0.003) {
        equalLowsPrice = (recentLows[i] + recentLows[j]) / 2;
        break;
      }
    }
    if (equalLowsPrice) break;
  }

  // Liquidity sweep: price briefly dipped below equal lows then recovered (stop hunt)
  const prevLow = Math.min(...lows.slice(-5, -1));
  const liquiditySweep = equalLowsPrice && prevLow < equalLowsPrice * 0.998 && price > equalLowsPrice;

  return { equalLows: equalLowsPrice, equalHighs: equalHighsPrice, liquiditySweep };
}

// ─── SMC: REFINED S/R ZONES ──────────────────────────────────────────────────
function calcSupportResistance(highs, lows, closes) {
  if (!closes || closes.length < 10) return { support: 0, resistance: 0, nearSupport: false, nearResistance: false, srZones: [] };
  const price = closes[closes.length - 1];
  const { pivotHighs, pivotLows } = findPivots(highs, lows, 3);

  // Build S/R zones by clustering pivot points within 1% of each other
  const allPivots = [
    ...pivotHighs.map(p => ({ price: p.price, type: 'R' })),
    ...pivotLows.map(p => ({ price: p.price, type: 'S' })),
  ].sort((a, b) => a.price - b.price);

  const zones = [];
  for (const pv of allPivots) {
    const existing = zones.find(z => Math.abs(z.price - pv.price) / z.price < 0.012);
    if (existing) { existing.touches++; existing.price = (existing.price + pv.price) / 2; }
    else zones.push({ price: pv.price, type: pv.type, touches: 1 });
  }
  // Sort by touch count (most tested = strongest)
  const strongZones = zones.filter(z => z.touches >= 1).sort((a, b) => b.touches - a.touches);

  // Nearest support below price, nearest resistance above price
  const supportZones = strongZones.filter(z => z.price < price * 0.999).sort((a, b) => b.price - a.price);
  const resistanceZones = strongZones.filter(z => z.price > price * 1.001).sort((a, b) => a.price - b.price);
  const support = supportZones[0]?.price || Math.min(...lows.slice(-20));
  const resistance = resistanceZones[0]?.price || Math.max(...highs.slice(-20));

  const range = resistance - support;
  const pct = range > 0 ? (price - support) / range : 0.5;
  const nearSupport = pct < 0.28;
  const nearResistance = pct > 0.80;

  return {
    support, resistance, pct, nearSupport, nearResistance,
    srZones: strongZones.slice(0, 6),
    supportZones: supportZones.slice(0, 3),
    resistanceZones: resistanceZones.slice(0, 3),
  };
}

function isOverextended(closes, ema20) {
  if (!ema20 || !closes.length) return false;
  return closes[closes.length - 1] > ema20 * 1.08;
}

// ─── MAIN SCORING ENGINE ──────────────────────────────────────────────────────
function scoreOpportunity({ closes, highs, lows, opens, volume, avgVolume }) {
  const price = closes[closes.length - 1];
  const klines = closes.map((c, i) => ({ o: opens[i], h: highs[i], l: lows[i], c }));

  const rsi = calcRSI(closes);
  const ema20 = calcEMA(closes, 20);
  const ema50 = calcEMA(closes, 50);
  const macd = calcMACD(closes);
  const bb = calcBollingerBands(closes);
  const candle = detectCandlePattern(klines);
  const div = detectRSIDivergence(closes);
  const sr = calcSupportResistance(highs, lows, closes);
  const ob = detectOrderBlocks(opens, highs, lows, closes);
  const bos = detectBOS(highs, lows, closes);
  const db = detectDoubleBottom(highs, lows, closes);
  const liq = detectLiquidityZones(highs, lows, closes);
  const volSpike = avgVolume > 0 ? volume / avgVolume : 1;
  const overextended = isOverextended(closes, ema20);

  const emaTrendBull = ema20 && ema50 && ema20 > ema50;
  const priceAboveEma20 = ema20 && price > ema20;

  const factors = {};

  // 1. RSI
  if (rsi < 30)        factors.rsi = { score: 18, label: `RSI ${rsi.toFixed(0)} — Oversold`, good: true };
  else if (rsi < 40)   factors.rsi = { score: 22, label: `RSI ${rsi.toFixed(0)} — Recovery zone`, good: true };
  else if (rsi < 50)   factors.rsi = { score: 15, label: `RSI ${rsi.toFixed(0)} — Neutral`, good: true };
  else if (rsi < 60)   factors.rsi = { score: 8,  label: `RSI ${rsi.toFixed(0)} — Elevated`, good: false };
  else if (rsi < 70)   factors.rsi = { score: 3,  label: `RSI ${rsi.toFixed(0)} — High`, good: false };
  else                 factors.rsi = { score: -5, label: `RSI ${rsi.toFixed(0)} — Overbought`, good: false };

  // 2. MACD
  if (macd.crossover)        factors.macd = { score: 20, label: "MACD Bullish Crossover ✦", good: true };
  else if (macd.recentCross) factors.macd = { score: 15, label: "MACD Recent Cross", good: true };
  else if (macd.bullish)     factors.macd = { score: 8,  label: "MACD Bullish", good: true };
  else if (macd.hist > 0)    factors.macd = { score: 4,  label: "MACD Hist Positive", good: true };
  else                       factors.macd = { score: -3, label: "MACD Bearish", good: false };

  // 3. Volume spike
  if (volSpike > 3.0)      factors.volume = { score: 20, label: `Vol ×${volSpike.toFixed(1)} — Huge spike`, good: true };
  else if (volSpike > 2.0) factors.volume = { score: 15, label: `Vol ×${volSpike.toFixed(1)} — Strong spike`, good: true };
  else if (volSpike > 1.4) factors.volume = { score: 9,  label: `Vol ×${volSpike.toFixed(1)} — Elevated`, good: true };
  else if (volSpike > 0.8) factors.volume = { score: 4,  label: `Vol ×${volSpike.toFixed(1)} — Normal`, good: false };
  else                     factors.volume = { score: 0,  label: `Vol ×${volSpike.toFixed(1)} — Low`, good: false };

  // 4. Candle pattern
  if (candle.strength >= 3)       factors.candle = { score: 18, label: `${candle.pattern} ✦`, good: true };
  else if (candle.strength === 2)  factors.candle = { score: 12, label: candle.pattern, good: true };
  else if (candle.strength === 1)  factors.candle = { score: 6,  label: candle.pattern, good: true };
  else if (candle.strength === 0)  factors.candle = { score: 2,  label: candle.pattern, good: false };
  else                             factors.candle = { score: -5, label: `${candle.pattern} ⚠`, good: false };

  // 5. Bollinger Bands
  if (bb.pct < 0.1)       factors.bb = { score: 14, label: "At Lower BB — Mean reversion setup", good: true };
  else if (bb.pct < 0.25) factors.bb = { score: 10, label: "Near Lower BB", good: true };
  else if (bb.pct < 0.5)  factors.bb = { score: 5,  label: "Mid-BB range", good: true };
  else if (bb.pct < 0.75) factors.bb = { score: 1,  label: "Upper BB half", good: false };
  else                    factors.bb = { score: -4, label: "Near Upper BB — Risky entry", good: false };

  // 6. S/R zone position
  if (sr.nearSupport)         factors.sr = { score: 14, label: "At Key S/R Support Zone ✦", good: true };
  else if (sr.pct < 0.45)     factors.sr = { score: 7,  label: "Below price midrange", good: true };
  else if (sr.nearResistance) factors.sr = { score: -8, label: "At Resistance Zone — Don't buy!", good: false };
  else                        factors.sr = { score: 2,  label: "Mid price range", good: false };

  // 7. EMA trend
  if (emaTrendBull && priceAboveEma20)         factors.trend = { score: 10, label: "Uptrend — EMA20 > EMA50", good: true };
  else if (emaTrendBull)                       factors.trend = { score: 6,  label: "Trend bullish, price dipping", good: true };
  else if (!emaTrendBull && !priceAboveEma20)  factors.trend = { score: -5, label: "Downtrend — counter-trend risk", good: false };
  else                                         factors.trend = { score: 2,  label: "Mixed trend", good: false };

  // 8. RSI Divergence
  if (div.bullishDiv)      factors.divergence = { score: 12, label: "Bullish RSI Divergence ✦ Early signal!", good: true };
  else if (div.bearishDiv) factors.divergence = { score: -6, label: "Bearish RSI Divergence ⚠", good: false };
  else                     factors.divergence = { score: 0,  label: "No RSI divergence", good: false };

  // ── SMC FACTORS ──────────────────────────────────────────────────
  // 9. Order Block
  if (ob.atBullishOB) {
    const s = ob.bullishOB?.strength || 1;
    factors.orderBlock = { score: s >= 3 ? 22 : s === 2 ? 16 : 10, label: `Bullish Order Block ✦ (demand zone ${s === 3 ? "strong" : "valid"})`, good: true };
  } else if (ob.atBearishOB) {
    factors.orderBlock = { score: -12, label: "Bearish Order Block ⚠ (supply zone overhead)", good: false };
  } else {
    factors.orderBlock = { score: 0, label: "No active Order Block", good: false };
  }

  // 10. Break of Structure
  if (bos.bullishBOS) {
    factors.bos = { score: 18, label: `BOS — Bullish Break of Structure ✦ (broke $${bos.bosLevel?.toFixed(4)})`, good: true };
  } else if (bos.choch) {
    factors.bos = { score: 14, label: "CHoCH — Change of Character (bearish→bullish flip) ✦", good: true };
  } else if (bos.bearishBOS) {
    factors.bos = { score: -10, label: "BOS — Bearish structure break ⚠", good: false };
  } else {
    factors.bos = { score: 0, label: "No structure break detected", good: false };
  }

  // 11. Double Bottom
  if (db.doubleBottom && db.brokePast) {
    factors.doubleBottom = { score: 16, label: `Double Bottom Confirmed ✦ (neckline broken)`, good: true };
  } else if (db.doubleBottom && db.nearNeckline) {
    factors.doubleBottom = { score: 10, label: `Double Bottom Near Breakout ✦`, good: true };
  } else if (db.doubleBottom) {
    factors.doubleBottom = { score: 5, label: "Double Bottom Forming", good: true };
  } else {
    factors.doubleBottom = { score: 0, label: "No double bottom", good: false };
  }

  // 12. Liquidity sweep (smart money swept lows then reversed)
  if (liq.liquiditySweep) {
    factors.liquidity = { score: 14, label: "Liquidity Sweep ✦ — Stop hunt complete, reversal likely", good: true };
  } else if (liq.equalLows && price < liq.equalLows * 1.01) {
    factors.liquidity = { score: 4, label: `Equal Lows at $${liq.equalLows?.toFixed(4)} — sweep pending`, good: false };
  } else if (liq.equalHighs && price > liq.equalHighs * 0.99) {
    factors.liquidity = { score: -4, label: "Equal Highs above — sell-side liquidity target", good: false };
  } else {
    factors.liquidity = { score: 0, label: "No liquidity zone nearby", good: false };
  }

  // ── Hard penalties ────────────────────────────────────────────────
  if (overextended) {
    factors.overextended = { score: -25, label: "⚠ Overextended — price >8% above EMA20", good: false };
  }
  if (sr.nearResistance && rsi > 65) {
    factors.topCandle = { score: -15, label: "⚠ Possible top — RSI high + at resistance zone", good: false };
  }

  const rawScore = Object.values(factors).reduce((s, f) => s + f.score, 0);
  // Offset +20 (reduced from +30) — prevents mid-tier setups being over-ranked
  const score = Math.max(0, Math.min(100, Math.round(rawScore + 20)));

  let signal;
  if (score >= 80)      signal = "PRIME";
  else if (score >= 63) signal = "STRONG";
  else if (score >= 45) signal = "WATCH";
  else                  signal = "AVOID";

  // Smart target/stop using OB + S/R zones
  const stopLoss = ob.bullishOB ? ob.bullishOB.low * 0.992 : (sr.support * 0.985 || price * 0.93);
  const target = bos.bosLevel ? price + (price - stopLoss) * 2.5 : (sr.resistance * 0.995 || price * 1.18);
  const rrRatio = stopLoss < price ? ((target - price) / (price - stopLoss)).toFixed(1) : "—";

  return {
    rsi, ema20, ema50, macd, bb, candle, div, sr, ob, bos, db, liq,
    volSpike, overextended, emaTrendBull, priceAboveEma20,
    factors, score, signal, target, stopLoss, rrRatio,
    support: sr.support, resistance: sr.resistance,
  };
}

function makeSim(coin, timeframe='4h') {
  // Use 120 bars (was 50) for reliable MACD, divergence, pivot detection
  const n = 120;
  let p = coin.price;
  // Generate realistic trending + pullback structure so SMC signals fire
  const trendDir = Math.random() > 0.45 ? 1 : -1;
  const pullbackAt = 50 + Math.floor(Math.random() * 30);
  const closes=[],opens=[],highs=[],lows=[];
  for (let i=0;i<n;i++) {
    const o=p;
    // Main trend with occasional pullback to create OBs, BOS, double bottoms
    let drift = trendDir * 0.003;
    if (i > pullbackAt && i < pullbackAt+15) drift = -trendDir * 0.004; // pullback creates OB
    if (i === pullbackAt+15) drift = trendDir * 0.008; // impulsive move after OB
    p *= (1 + drift + (Math.random()-0.485)*0.018);
    const h=Math.max(o,p)*(1+Math.random()*0.007);
    const l=Math.min(o,p)*(1-Math.random()*0.007);
    opens.push(o);closes.push(p);highs.push(h);lows.push(l);
  }
  const avgVol = coin.vol * (0.8+Math.random()*0.4);
  const volume = avgVol * (0.6+Math.random()*2.8);
  const change24h=(closes[n-1]-closes[n-2])/closes[n-2]*100;
  const change7d=(closes[n-1]-closes[Math.max(0,n-43)])/closes[Math.max(0,n-43)]*100;
  const analysis=scoreOpportunity({closes,highs,lows,opens,volume,avgVolume:avgVol});
  const market = Math.random() > 0.5 ? "PERP" : "SPOT";
  const funding = market==="PERP" ? (Math.random()-0.5)*0.008 : null;
  const openInterest = market==="PERP" ? coin.vol * (0.3+Math.random()*0.8) : null;
  return {
    id:coin.symbol+(market==="PERP"?"-PERP":""),
    symbol:coin.symbol,name:coin.symbol,
    price:closes[n-1],change24h,change7d,volume,
    closes,opens,highs,lows,...analysis,
    dataSource:"simulated",market,
    funding:funding||null,openInterest:openInterest||null,fundingBonus:0,
    timeframe:'4h'
  };
}

function ScoreRing({score}){
  const c=score>=80?"#00ff88":score>=63?"#22c55e":score>=45?"#eab308":"#ef4444";
  const r=16,circ=2*Math.PI*r,dash=circ*(score/100);
  return(
    <svg width="42" height="42" style={{flexShrink:0}}>
      <circle cx="21" cy="21" r={r} fill="none" stroke="#111820" strokeWidth="3"/>
      <circle cx="21" cy="21" r={r} fill="none" stroke={c} strokeWidth="3"
        strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={circ/4}
        strokeLinecap="round" style={{filter:`drop-shadow(0 0 4px ${c}88)`}}/>
      <text x="21" y="25" textAnchor="middle" fill={c} fontSize="10" fontFamily="'IBM Plex Mono',monospace" fontWeight="700">{score}</text>
    </svg>
  );
}

      autosize:true,symbol:tvSymbol,interval:tvInterval,
      timezone:"Etc/UTC",theme:"dark",style:"1",locale:"en",
      backgroundColor:"#050810",gridColor:"#0d1220",
      hide_top_toolbar:false,save_image:false,studies:[],
      support_host:"https://www.tradingview.com"
    });
    ref.current.appendChild(s);
  },[tvSymbol,tvInterval]);
  return(
    <div style={{width:"100%",borderRadius:8,overflow:"hidden",border:"1px solid #0d1220"}}>
      <div style={{background:"#060a12",padding:"5px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #0d1220"}}>
        <span style={{fontFamily:"var(--font-mono)",fontSize:10,color:"#6a8aaa"}}>{tvSymbol} · {intervalLabel}</span>
        <span style={{fontSize:9,color:"#3a5060",fontFamily:"var(--font-mono)"}}>Add indicators via chart toolbar →</span>
      </div>
      <div style={{height:290}}>
        <div ref={ref} style={{width:"100%",height:"100%"}}><div style={{width:"100%",height:"100%"}}/></div>
      </div>
    </div>
  );
}

function fmtFunding(rate){
  if(rate===null||rate===undefined) return"—";
  const pct=(rate*100).toFixed(4);
  return(rate>=0?"+":"")+pct+"%";
}
function fmtOI(n){
  if(!n) return"—";
  if(n>=1e9) return"$"+(n/1e9).toFixed(2)+"B";
  if(n>=1e6) return"$"+(n/1e6).toFixed(1)+"M";
  return"$"+n.toFixed(0);
}

  const [progress,setProgress]=useState(0);

  const scan=useCallback(async()=>{
    setScanning(true);setProgress(0);setSelected(null);
    const errs=[];let liveOk=false;let result=[];

    // Build opportunity directly from klines — no /ticker/24hr needed
    // Price, volume and 24h change all derived from the klines data
    function buildFromKlines(sym, klines, extras={}){
      if(!klines||klines.length<20) return null;
      const opens=klines.map(k=>parseFloat(k[1]));
      const highs=klines.map(k=>parseFloat(k[2]));
      const lows=klines.map(k=>parseFloat(k[3]));
      const closes=klines.map(k=>parseFloat(k[4]));
      const vols=klines.map(k=>parseFloat(k[5]));
      const n=closes.length;
      const price=closes[n-1];
      // 24h volume = sum of last 6 bars (6×4H = 24H)
      const volume=vols.slice(-6).reduce((a,b)=>a+b,0)*price;
      if(volume<5e7) return null; // enforce $50M min volume
      const avgVolume=vols.slice(-21,-1).reduce((a,b)=>a+b,0)/20;
      // 24h and 7d change from klines
      const change24h=n>=7?((closes[n-1]-closes[n-7])/closes[n-7])*100:0;
      const change7d=n>=42?((closes[n-1]-closes[n-42])/closes[n-42])*100:change24h;
      const analysis=scoreOpportunity({closes,highs,lows,opens,volume,avgVolume});
      return{id:sym+(extras.market==="PERP"?"-PERP":""),symbol:sym,name:sym,
        price,change24h,change7d,volume,closes,opens,highs,lows,
        ...analysis,dataSource:"live",...extras};
    }

    try{
      setScanStatus("Loading 4H klines…");

      // ── PHASE 1: Fetch klines for all symbols in parallel batches ──────────
      // No /ticker/24hr call — everything comes from klines directly
      // This endpoint is never blocked by browsers or Binance rate limiting
      const BATCH=12;
      const spotKMap={};const futKMap={};

      for(let i=0;i<SPOT_SYMBOLS.length;i+=BATCH){
        const batch=SPOT_SYMBOLS.slice(i,i+BATCH);
        await Promise.all(batch.map(async sym=>{
          try{const r=await fetch(`${BASE}/klines?symbol=${sym}&interval=4h&limit=100`);
            if(r.ok) spotKMap[sym]=await r.json();}catch(e){}
        }));
        setProgress(5+Math.round(((i+BATCH)/SPOT_SYMBOLS.length)*35));
      }

      for(let i=0;i<PERP_SYMBOLS.length;i+=BATCH){
        const batch=PERP_SYMBOLS.slice(i,i+BATCH);
        await Promise.all(batch.map(async sym=>{
          try{const r=await fetch(`${FBASE}/klines?symbol=${sym}&interval=4h&limit=100`);
            if(r.ok) futKMap[sym]=await r.json();}catch(e){}
        }));
        setProgress(40+Math.round(((i+BATCH)/PERP_SYMBOLS.length)*25));
      }

      // ── PHASE 2: Fetch funding rates (lightweight, never blocked) ──────────
      setScanStatus("Fetching funding rates…");
      const fundingMap={};const oiMap={};
      try{
        const frRes=await fetch(`${FBASE}/premiumIndex`);
        if(frRes.ok){const d=await frRes.json();d.forEach(x=>{fundingMap[x.symbol]=parseFloat(x.lastFundingRate);});}
      }catch(e){}

      setProgress(70);
      setScanStatus("Scoring signals…");

      // ── PHASE 3: Score all coins ────────────────────────────────────────────
      const spotOps=SPOT_SYMBOLS
        .map(sym=>buildFromKlines(sym.replace("USDT",""),spotKMap[sym],{market:"SPOT"}))
        .filter(Boolean);

      const futOps=PERP_SYMBOLS.map(sym=>{
        const base=sym.replace("USDT","");
        const funding=fundingMap[sym]??null;
        let fundingBonus=0;
        if(funding!==null){
          if(funding<-0.001) fundingBonus=8;
          else if(funding<0) fundingBonus=4;
          else if(funding>0.003) fundingBonus=-5;
        }
        const op=buildFromKlines(base,futKMap[sym],{market:"PERP",funding,openInterest:oiMap[sym]||0,fundingBonus});
        if(!op) return null;
        if(fundingBonus){
          op.score=Math.max(0,Math.min(100,op.score+fundingBonus));
          if(op.score>=80) op.signal="PRIME";
          else if(op.score>=63) op.signal="STRONG";
          else if(op.score>=45) op.signal="WATCH";
          else op.signal="AVOID";
        }
        return op;
      }).filter(Boolean);

      // Merge — keep both SPOT and PERP as separate entries
      const byBase={};
      [...spotOps,...futOps].forEach(op=>{
        const key=op.id;
        if(!byBase[key]||op.score>byBase[key].score) byBase[key]=op;
      });
      result=Object.values(byBase);
      liveOk=result.length>0;
      if(!liveOk) errs.push("Klines API unavailable — showing SIM data");

    }catch(e){
      errs.push(`Error: ${e.message}`);
    }

    // ── SIM FALLBACK: if both APIs failed (no data at all), show sim data ──
    // This fires when API returns non-ok (blocked, region-restricted, rate limited)
    // AND when a JS exception occurs. Previously only the catch block triggered sim.
    if(result.length===0){
      result=SIM_COINS.map(makeSim);
      liveOk=false;
      // Only add the sim notice if there isn't already an API error showing
      if(errs.length===0) errs.push("APIs unreachable — showing simulated data");
    }

    setProgress(100);setScanStatus("");setOps(result);setLastScan(new Date());setErrors(errs);setDataMode(liveOk?"live":"sim");setScanning(false);
  },[]);

  useEffect(()=>{scan();},[]);
  useEffect(()=>{
    if(autoTimer.current) clearInterval(autoTimer.current);
    if(config.autoRefresh) autoTimer.current=setInterval(scan,config.interval*1000);
    return()=>{if(autoTimer.current) clearInterval(autoTimer.current);};
  },[config,scan]);

  // ── 1H INTRADAY SCAN ────────────────────────────────────────────────────────
  const scan1h=useCallback(async()=>{
    setScanning1h(true);setSelected(null);
    const errs=[];let liveOk=false;let result=[];

    try{
      // Klines-first — no /ticker/24hr needed, same approach as 4H scan
      const BATCH=12;
      const spotKMap={},futKMap={};
      const SYM_1H=SPOT_SYMBOLS.slice(0,60);
      const PERP_1H=PERP_SYMBOLS.slice(0,60);

      for(let i=0;i<SYM_1H.length;i+=BATCH){
        await Promise.all(SYM_1H.slice(i,i+BATCH).map(async sym=>{
          try{const r=await fetch(`${BASE}/klines?symbol=${sym}&interval=1h&limit=200`);
            if(r.ok) spotKMap[sym]=await r.json();}catch(e){}
        }));
      }
      for(let i=0;i<PERP_1H.length;i+=BATCH){
        await Promise.all(PERP_1H.slice(i,i+BATCH).map(async sym=>{
          try{const r=await fetch(`${FBASE}/klines?symbol=${sym}&interval=1h&limit=200`);
            if(r.ok) futKMap[sym]=await r.json();}catch(e){}
        }));
      }

      const fundingMap={};
      try{const frRes=await fetch(`${FBASE}/premiumIndex`);if(frRes.ok){const d=await frRes.json();d.forEach(x=>{fundingMap[x.symbol]=parseFloat(x.lastFundingRate);});}}catch(e){}

      function buildFrom1h(sym,klines,extras={}){
        if(!klines||klines.length<35) return null;
        const opens=klines.map(k=>parseFloat(k[1]));
        const highs=klines.map(k=>parseFloat(k[2]));
        const lows=klines.map(k=>parseFloat(k[3]));
        const closes=klines.map(k=>parseFloat(k[4]));
        const vols=klines.map(k=>parseFloat(k[5]));
        const n=closes.length;
        const price=closes[n-1];
        const volume=vols.slice(-24).reduce((a,b)=>a+b,0)*price; // 24×1H = 24h volume
        if(volume<5e7) return null;
        const avgVolume=vols.slice(-25,-1).reduce((a,b)=>a+b,0)/24;
        const change24h=n>=25?((closes[n-1]-closes[n-25])/closes[n-25])*100:0;
        const change7d=n>=169?((closes[n-1]-closes[n-169])/closes[n-169])*100:change24h;
        const analysis=scoreOpportunity({closes,highs,lows,opens,volume,avgVolume});
        return{id:sym+"-1H"+(extras.market==="PERP"?"-PERP":""),symbol:sym,name:sym,
          price,change24h,change7d,volume,closes,opens,highs,lows,
          ...analysis,dataSource:"live",timeframe:"1h",...extras};
      }

      const spotOps=SYM_1H.map(sym=>buildFrom1h(sym.replace("USDT",""),spotKMap[sym],{market:"SPOT"})).filter(Boolean);
      const futOps=PERP_1H.map(sym=>{
        const base=sym.replace("USDT","");
        const funding=fundingMap[sym]??null;
        let fundingBonus=0;
        if(funding!==null){if(funding<-0.001)fundingBonus=8;else if(funding<0)fundingBonus=4;else if(funding>0.003)fundingBonus=-5;}
        const op=buildFrom1h(base,futKMap[sym],{market:"PERP",funding,openInterest:null,fundingBonus});
        if(!op) return null;
        if(fundingBonus){op.score=Math.max(0,Math.min(100,op.score+fundingBonus));if(op.score>=80)op.signal="PRIME";else if(op.score>=63)op.signal="STRONG";else if(op.score>=45)op.signal="WATCH";else op.signal="AVOID";}
        return op;
      }).filter(Boolean);

      const byBase={};
      [...spotOps,...futOps].forEach(op=>{
        if(!byBase[op.id]||op.score>byBase[op.id].score) byBase[op.id]=op;
      });
      result=Object.values(byBase);
      liveOk=result.length>0;
    }catch(e){
      errs.push(`1H Error: ${e.message}`);
    }

    // SIM fallback for 1H — same logic as 4H
    if(result.length===0){
      result=SIM_COINS.map(c=>makeSim(c,'1h')).map(o=>({...o,id:o.symbol+"-1H"+(o.market==="PERP"?"-PERP":""),timeframe:"1h"}));
      liveOk=false;
    }
    setOps1h(result);setLastScan1h(new Date());setErrors1h(errs);setDataMode1h(liveOk?"live":"sim");setScanning1h(false);
  },[]);

  const TIERS=["ALL","PRIME","STRONG","WATCH","AVOID"];
  // Active ops depends on which tab is showing
  const activeOps=activeTab==="1h"?ops1h:ops;
  const activeScanning=activeTab==="1h"?scanning1h:scanning;
  const filtered=useMemo(()=>activeOps
    .filter(o=>filter==="ALL"||o.signal===filter)
    .filter(o=>marketFilter==="ALL"||o.market===marketFilter)
    .filter(o=>o.score>=minScore)
    .filter(o=>o.volume>=(minVol*1e6))
    .filter(o=>!hideWarnings||(o.signal!=="AVOID"&&!o.overextended&&!o.sr?.nearResistance))
    .filter(o=>!search||o.symbol.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sortBy==="score") return b.score-a.score;
      if(sortBy==="rsi") return a.rsi-b.rsi;
      if(sortBy==="volSpike") return b.volSpike-a.volSpike;
      if(sortBy==="change24h") return b.change24h-a.change24h;
      if(sortBy==="price") return b.price-a.price;
      return b.score-a.score;
    })
  ,[activeOps,filter,marketFilter,minScore,minVol,hideWarnings,search,sortBy]);

  const displayOps=activeTab==="1h"?ops1h:ops;
  const primes=displayOps.filter(o=>o.signal==="PRIME").length;
  const strongs=displayOps.filter(o=>o.signal==="STRONG").length;
  const divs=displayOps.filter(o=>o.div?.bullishDiv).length;
  const crossovers=displayOps.filter(o=>o.macd?.crossover||o.macd?.recentCross).length;
  const spotCount=displayOps.filter(o=>o.market==="SPOT").length;
  const perpCount=displayOps.filter(o=>o.market==="PERP").length;
  const obCount=displayOps.filter(o=>o.ob?.atBullishOB).length;
  const bosCount=displayOps.filter(o=>o.bos?.bullishBOS||o.bos?.choch).length;
  const curDataMode=activeTab==="1h"?dataMode1h:dataMode;
  const curLastScan=activeTab==="1h"?lastScan1h:lastScan;

  return(
    <div className="app-root" style={{background:"#040608",fontFamily:"var(--font-sans)",color:"#c8d4e8",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* HEADER */}
      <div style={{borderBottom:"1px solid #131c2e",padding:"8px 16px",background:"#060a12",flexShrink:0}}>
        {/* Top row: logo + stats + controls */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#00ff88",boxShadow:"0 0 10px #00ff88",animation:"pulse 2s infinite"}}/>
              <span style={{fontFamily:"var(--font-mono)",fontSize:14,fontWeight:700,letterSpacing:2,color:"#ffffff"}}>SWING SCANNER PRO</span>
              {curDataMode==="live"
                ?<span style={{fontSize:10,background:"#071a0f",border:"1px solid #00ff8870",color:"#00ff88",padding:"2px 7px",borderRadius:4,fontFamily:"var(--font-mono)",fontWeight:700}}>● LIVE</span>
                :<span style={{fontSize:10,background:"#161200",border:"1px solid #eab30870",color:"#eab308",padding:"2px 7px",borderRadius:4,fontFamily:"var(--font-mono)",fontWeight:700}}>● SIM</span>}
            </div>
            <div style={{height:14,width:1,background:"#1a2535"}}/>
            <span style={{fontSize:11,color:"#00ff88",fontFamily:"var(--font-mono)",fontWeight:700}}>{primes} PRIME</span>
            <span style={{fontSize:11,color:"#22c55e",fontFamily:"var(--font-mono)",fontWeight:700}}>{strongs} STRONG</span>
            <span style={{fontSize:11,color:"#f59e0b",fontFamily:"var(--font-mono)"}}>{obCount} OB</span>
            <span style={{fontSize:11,color:"#00e5ff",fontFamily:"var(--font-mono)"}}>{bosCount} BOS</span>
            <span style={{fontSize:11,color:"#a78bfa",fontFamily:"var(--font-mono)"}}>{divs} DIV</span>
            <span style={{fontSize:10,color:"#38bdf8",fontFamily:"var(--font-mono)",background:"#071828",border:"1px solid #1a3040",padding:"1px 6px",borderRadius:3}}>SPOT {spotCount}</span>
            <span style={{fontSize:10,color:"#a78bfa",fontFamily:"var(--font-mono)",background:"#0e0a20",border:"1px solid #2a1a50",padding:"1px 6px",borderRadius:3}}>PERP {perpCount}</span>
            {curLastScan&&<span style={{fontSize:10,color:"#3a5060",fontFamily:"var(--font-mono)"}}>{curLastScan.toLocaleTimeString()}</span>}
            {(activeTab==="4h"?errors:errors1h).length>0&&<span style={{fontSize:10,color:"#f87171",background:"#1c0808",border:"1px solid #3a1010",padding:"2px 8px",borderRadius:4,fontFamily:"var(--font-mono)"}}>⚠ {(activeTab==="4h"?errors:errors1h)[0]}</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            {config.autoRefresh&&<span style={{fontSize:10,color:"#22c55e",fontFamily:"var(--font-mono)"}}>AUTO ✓</span>}
            <button onClick={()=>setShowSettings(true)} style={{background:"#0e1828",border:"1px solid #1e3040",color:"#8ab0d0",padding:"5px 11px",borderRadius:5,cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:11}}>⚙</button>
            <button onClick={activeTab==="1h"?scan1h:scan} disabled={activeScanning} style={{background:activeScanning?"#040810":"#071f0e",border:`1px solid ${activeScanning?"#1a2535":"#00ff88"}`,color:activeScanning?"#3a5040":"#00ff88",padding:"5px 14px",borderRadius:5,cursor:activeScanning?"not-allowed":"pointer",fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,letterSpacing:1}}>
              {activeScanning?`⟳ ${progress}%`:"⟳ SCAN"}
            </button>
          </div>
        </div>
        {/* Timeframe selector tabs */}
        <div style={{display:"flex",gap:4}}>
          {[
            {id:"4h",label:"4H SWING",sub:"Multi-day setups",color:"#22c55e",count:ops.length},
            {id:"1h",label:"1H INTRADAY",sub:"Same-day opportunities",color:"#38bdf8",count:ops1h.length},
          ].map(tab=>(
            <button key={tab.id} onClick={()=>{setActiveTab(tab.id);setSelected(null);if(tab.id==="1h"&&ops1h.length===0)scan1h();}}
              style={{display:"flex",alignItems:"center",gap:7,padding:"5px 14px",borderRadius:5,cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,letterSpacing:1,border:`1px solid ${activeTab===tab.id?tab.color+"80":"#1a2535"}`,background:activeTab===tab.id?"#0a1422":"transparent",color:activeTab===tab.id?tab.color:"#4a6080",transition:"all 0.15s"}}>
              <span>{tab.label}</span>
              <span style={{fontSize:9,fontWeight:400,color:activeTab===tab.id?tab.color+"99":"#2a3a50"}}>{tab.sub}</span>
              {tab.count>0&&<span style={{fontSize:9,background:activeTab===tab.id?tab.color+"22":"#0e1828",border:`1px solid ${activeTab===tab.id?tab.color+"40":"#1a2535"}`,color:activeTab===tab.id?tab.color:"#3a5060",padding:"0 5px",borderRadius:3}}>{tab.count}</span>}
              {tab.id==="1h"&&scanning1h&&<span style={{fontSize:9,color:"#38bdf8",animation:"blink 0.8s infinite"}}>●</span>}
            </button>
          ))}
        </div>
      </div>
      {activeScanning&&<div style={{height:2,background:"#080d14",flexShrink:0}}><div style={{height:2,background:activeTab==="1h"?"#38bdf8":"#00ff88",width:`${progress}%`,transition:"width 0.3s ease",boxShadow:`0 0 8px ${activeTab==="1h"?"#38bdf8":"#00ff88"}`}}/></div>}

      {/* FILTER BAR */}
      <div style={{padding:"6px 14px",borderBottom:"1px solid #0d1520",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,gap:8,flexWrap:"wrap",background:"#050810"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {/* Signal tier tabs */}
          <div style={{display:"flex",gap:4}}>
            {TIERS.map(t=>{
              const s=t!=="ALL"?SC[t]:null;
              return<button key={t} onClick={()=>setFilter(t)} style={{background:filter===t?(s?s.bg:"#0e1828"):"transparent",border:`1px solid ${filter===t?(s?s.border:"#38bdf8"):"#1a2535"}`,color:filter===t?(s?s.text:"#38bdf8"):"#6a8aaa",padding:"4px 11px",borderRadius:4,cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:10,letterSpacing:1,fontWeight:filter===t?700:400}}>{t}</button>;
            })}
          </div>
          {/* Divider */}
          <div style={{width:1,height:20,background:"#1a2535"}}/>
          {/* Market type tabs */}
          <div style={{display:"flex",gap:3}}>
            {[["ALL","ALL","#6a8aaa"],["SPOT","SPOT","#38bdf8"],["PERP","PERP","#a78bfa"]].map(([val,label,c])=>(
              <button key={val} onClick={()=>setMarketFilter(val)}
                style={{background:marketFilter===val?"#0a1020":"transparent",border:`1px solid ${marketFilter===val?c:"#1a2535"}`,color:marketFilter===val?c:"#6a8aaa",padding:"4px 10px",borderRadius:4,cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:10,letterSpacing:1,fontWeight:marketFilter===val?700:400}}>
                {label}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="⌕ Search coin…" style={{background:"#0a0f1a",border:"1px solid #1a2535",color:"#c8d4e8",padding:"5px 9px",borderRadius:4,fontFamily:"var(--font-mono)",fontSize:10,outline:"none",width:110}}/>
          <select value={minScore} onChange={e=>setMinScore(Number(e.target.value))} style={{background:"#0a0f1a",border:"1px solid #1a2535",color:"#c8d4e8",padding:"5px 7px",borderRadius:4,fontFamily:"var(--font-mono)",fontSize:10,outline:"none"}}>
            {[0,40,50,60,70,80].map(v=><option key={v} value={v}>{v===0?"Score: All":"Score ≥"+v}</option>)}
          </select>
          <select value={minVol} onChange={e=>setMinVol(Number(e.target.value))} style={{background:"#0a0f1a",border:"1px solid #1a2535",color:"#c8d4e8",padding:"5px 7px",borderRadius:4,fontFamily:"var(--font-mono)",fontSize:10,outline:"none"}}>
            {[50,100,200,500].map(v=><option key={v} value={v}>Vol ≥${v}M</option>)}
          </select>
          <button onClick={()=>setHideWarnings(v=>!v)} style={{background:hideWarnings?"#1a1000":"#0a0f1a",border:`1px solid ${hideWarnings?"#eab308":"#1a2535"}`,color:hideWarnings?"#eab308":"#6a8aaa",padding:"4px 10px",borderRadius:4,cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:10,fontWeight:hideWarnings?700:400}}>
            {hideWarnings?"SAFE MODE ✓":"SAFE MODE"}
          </button>
          <span style={{fontSize:10,color:"#4a6080",fontFamily:"var(--font-mono)"}}>{filtered.length} results</span>
        </div>
      </div>

      {/* MAIN — on mobile, detail panel takes full width */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch",display:selected?"none":"block",minWidth:0}}>
          {activeScanning&&filtered.length===0?(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:10}}>
              <div style={{fontFamily:"var(--font-mono)",color:activeTab==="1h"?"#38bdf8":"#00ff88",fontSize:13,letterSpacing:4,animation:"blink 1s ease-in-out infinite"}}>{activeTab==="1h"?"SCANNING 1H":"SCANNING 4H"}</div>
              <div style={{color:"#6a8aaa",fontSize:11,letterSpacing:1,marginTop:4}}>{activeTab==="1h"?"Fetching intraday klines…":scanStatus||"Initialising…"}</div>
              <div style={{color:"#4a6080",fontSize:10}}>{activeTab==="1h"?"Top 80 pairs · 200 bars each":progress+"%"}</div>
            </div>
          ):(
            <>
              <TableHeader sortBy={sortBy} setSortBy={setSortBy}/>
              {filtered.length===0&&<div style={{color:"#6a8aaa",fontSize:13,textAlign:"center",marginTop:60,fontFamily:"var(--font-mono)"}}>No coins match current filters</div>}
              {filtered.map(op=><Row key={op.id} op={op} onClick={setSelected} selected={selected?.id===op.id}/>)}
            </>
          )}
        </div>
        {selected&&(
          <div style={{
            width:440,maxWidth:"100%",
            borderLeft:"1px solid #131c2e",
            overflowY:"auto",overflowX:"hidden",
            WebkitOverflowScrolling:"touch",
            background:"#060a12",
            flexShrink:0,display:"flex",flexDirection:"column",
            /* iOS: position absolute so it doesn't fight flex layout on small screens */
            position:"absolute",right:0,top:0,bottom:0,zIndex:20
          }}>
            {/* Sticky back bar */}
            <div style={{position:"sticky",top:0,zIndex:10,background:"#060a12",borderBottom:"1px solid #131c2e",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <button
                onClick={()=>setSelected(null)}
                style={{display:"flex",alignItems:"center",gap:7,background:"#0e1828",border:"1px solid #1e3040",color:"#c8d4e8",padding:"7px 14px",borderRadius:6,cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,letterSpacing:1,transition:"all 0.15s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="#162030";e.currentTarget.style.borderColor="#38bdf8";e.currentTarget.style.color="#38bdf8";}}
                onMouseLeave={e=>{e.currentTarget.style.background="#0e1828";e.currentTarget.style.borderColor="#1e3040";e.currentTarget.style.color="#c8d4e8";}}
              >
                ← BACK TO LIST
              </button>
              <span style={{fontFamily:"var(--font-mono)",fontSize:12,color:"#ffffff",fontWeight:700}}>{selected.symbol}/USDT</span>
            </div>
            <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
              <DetailPanel op={selected} onAlert={setAlertOp}/>
            </div>
          </div>
        )}
      </div>

      {alertOp&&<AlertModal op={alertOp} onClose={()=>setAlertOp(null)}/>}
      {showSettings&&<SettingsModal config={config} onSave={c=>{setConfig(c);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
